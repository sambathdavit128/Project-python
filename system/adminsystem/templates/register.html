<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Jobify</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Plus Jakarta Sans", "Kantumruy Pro", sans-serif; background-color: #f3f7fa; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">

    <div class="bg-white w-full max-w-5xl rounded-3xl shadow-xl overflow-hidden grid grid-cols-1 md:grid-cols-2">
        
        <div class="bg-[#e9f2f8] p-10 flex flex-col justify-between items-center text-center relative">
            <div class="w-full text-left flex items-center gap-2 mb-6">
                <div class="w-8 h-8 bg-[#0b4566] text-white flex items-center justify-center font-bold text-lg rounded-lg">J</div>
                <span class="text-lg font-bold text-[#0b4566]">Jobify</span>
            </div>
            
            <div class="my-auto space-y-6">
                <h2 class="text-3xl font-extrabold text-gray-800 leading-tight">Welcome to <br><span class="text-[#0b4566]">Jobify</span> Job Seeker</h2>
                <p class="text-gray-500 font-medium text-sm">Find your dream job now.</p>
                <img src="https://illustrations.popsy.co/amber/searching-for-opportunities.svg" alt="Illustration" class="w-64 h-auto mx-auto mt-4 drop-shadow-sm">
            </div>
        </div>

        <div class="p-8 sm:p-12 flex flex-col justify-center">
            <div class="text-right text-sm text-gray-500 mb-6">
                Are you a member? <a href="/login/" class="text-[#0b4566] font-bold hover:underline">Login</a>
            </div>

            <h3 class="text-2xl font-bold text-gray-800 mb-6 text-center md:text-left">Register</h3>

            {% if messages %}
                {% for message in messages %}
                    <div class="bg-red-50 text-red-600 text-xs p-3 rounded-xl mb-4 border border-red-200">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <input type="text" name="username" placeholder="Full name / Username" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#0b4566] text-sm bg-gray-50/50">
                </div>
                <div>
                    <input type="email" name="email" placeholder="Email" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#0b4566] text-sm bg-gray-50/50">
                </div>
                <div>
                    <input type="password" name="password" placeholder="Password" required class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-[#0b4566] text-sm bg-gray-50/50">
                </div>

                <button type="submit" class="w-full py-3 bg-[#0b4566] text-white font-semibold rounded-xl hover:bg-[#08334c] transition shadow-md text-sm">Register</button>
            </form>

            <div class="mt-6">
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-xs text-gray-400 font-semibold uppercase">OR</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <div class="space-y-2 mt-4">
                    <button class="w-full py-2.5 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-sm hover:bg-blue-700 transition flex items-center justify-center gap-2">
                        Sign up with Google
                    </button>
                    <button class="w-full py-2.5 bg-[#0077b5] text-white rounded-xl text-xs font-bold shadow-sm hover:bg-[#006296] transition flex items-center justify-center gap-2">
                        Sign up with Linkedin
                    </button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
