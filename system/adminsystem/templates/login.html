{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jobify</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Plus Jakarta Sans", "Kantumruy Pro", sans-serif; background-color: #f3f7fa; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-5xl rounded-3xl shadow-xl overflow-hidden grid grid-cols-1 md:grid-cols-2">
        
        <div class="bg-[#e9f2f8] p-10 flex flex-col justify-between items-center text-center">
            <div class="w-full text-left flex items-center gap-2">
                <div class="w-8 h-8 bg-[#0b4566] text-white flex items-center justify-center font-bold text-lg rounded-lg">J</div>
                <span class="text-lg font-bold text-[#0b4566]">Jobify</span>
            </div>
            <div class="my-auto space-y-4">
                <h2 class="text-3xl font-extrabold text-gray-800">Welcome Back!</h2>
                <p class="text-gray-500 text-sm">Sign in to continue your career journey.</p>
                <img src="https://illustrations.popsy.co/amber/work-from-home.svg" alt="Login View" class="w-64 h-auto mx-auto mt-4">
            </div>
        </div>

        <div class="p-8 sm:p-12 flex flex-col justify-center">
            <div class="text-right text-sm text-gray-500 mb-6">
                Not a member? <a href="/register/" class="text-[#0b4566] font-bold hover:underline">Register</a>
            </div>
            
            <h3 class="text-2xl font-bold text-gray-800 mb-6">Login</h3>

            {% if messages %}
                {% for message in messages %}
                    <div class="bg-red-50 text-red-600 text-xs p-3 rounded-xl mb-4 border border-red-200">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <input type="text" name="username" placeholder="Username" required class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm bg-gray-50/50 focus:outline-none focus:border-[#0b4566]">
                </div>
                <div>
                    <input type="password" name="password" placeholder="Password" required class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm bg-gray-50/50 focus:outline-none focus:border-[#0b4566]">
                </div>
                
                <button type="submit" class="w-full py-3 bg-[#0b4566] text-white font-semibold rounded-xl hover:bg-[#08334c] text-sm shadow-md transition">Login</button>
            </form>

            <div class="mt-6">
                <div class="relative flex py-2 items-center">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink mx-4 text-xs text-gray-400 font-semibold uppercase">OR</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>
                <div class="space-y-2 mt-4">
                    <button class="w-full py-2.5 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-sm hover:bg-blue-700 transition">Login with Google</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
